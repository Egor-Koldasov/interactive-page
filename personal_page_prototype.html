<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Windy Forest ASCII</title>
    <style>
      :root {
        --paper: #000000;
        --ink: #d1d1d1;
        --muted: #52616d;
        --panel: rgba(246, 242, 232, 0.72);
        --shadow: rgba(17, 34, 51, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", "Gill Sans", "Avenir Next", sans-serif;
        color: var(--ink);
        background: black;
      }

      #main-bg {
        width: 100%;
        height: 100vh;
        filter: brightness(0.2);
      }

      main {
        margin: 0 auto;
        position: absolute;
        inset: 0;
        overflow-y: auto;
      }
      .content-box {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 32px;
        gap: 32px;
      }
      .name {
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
        color: var(--ink);
      }
      .terminal {
        height: 1px;
        width: 600px;
        max-width: 90vw;
        background-color: black;
        flex-grow: 1;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        padding: 4px 8px;
      }

      .page {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 36px;
      }

      .hero {
        display: grid;
        gap: 16px;
        align-items: start;
      }

      .card {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.42);
        border-radius: 24px;
        box-shadow: 0 20px 60px var(--shadow);
        backdrop-filter: blur(20px);
      }

      .intro {
        padding: 20px 22px;
      }

      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.76rem;
        color: #745b2d;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
      }

      .intro p {
        max-width: 62ch;
        margin: 14px 0 0;
        font-size: 1rem;
        line-height: 1.55;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 2.1fr 1fr;
        gap: 16px;
      }

      .scene {
        min-height: 540px;
        padding: 14px;
      }

      .scene-frame,
      .mini-frame {
        width: 100%;
        height: 100%;
        border-radius: 18px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      }

      .sidebar {
        display: grid;
        gap: 16px;
      }

      .note {
        padding: 18px;
      }

      .note h2 {
        margin: 0 0 10px;
        font-size: 1.1rem;
      }

      .note p,
      .note code {
        font-size: 0.95rem;
      }

      .note p {
        margin: 0;
        line-height: 1.5;
        color: var(--muted);
      }

      .mini-scene {
        padding: 12px;
        min-height: 238px;
      }

      .mini-frame {
        height: 214px;
      }

      code {
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        color: #1e483e;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .scene {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div id="main-bg"></div>
    <main>
      <div class="content-box">
        <div class="name">Egor Koldasov</div>
        <div class="terminal">
          guest@egorkolds_page:~$
        </div>
      </div>
    </main>

    <script src="./windy-forest.js"></script>
    <script>
      window.createWindyForestAscii(document.getElementById("main-bg"), {
        speed: 0.9
      });
    </script>
  </body>
  </html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Egor Koldasov</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Trebuchet MS", "Gill Sans", "Avenir Next", sans-serif;
        color: #d1d1d1;
        background: #000;
      }

      body {
        position: relative;
        min-height: 100vh;
      }

      #main-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        filter: brightness(0.2);
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 1;
        overflow-y: auto;
        min-height: 100vh;
      }

      .content-box {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 32px;
        gap: 32px;
      }

      .name {
        font-size: clamp(2rem, 7vw, 4.5rem);
        line-height: 0.95;
        color: inherit;
        text-align: center;
      }

      .terminal {
        height: 1px;
        width: 600px;
        max-width: 90vw;
        background-color: rgba(0, 0, 0, 0.82);
        flex-grow: 1;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        padding: 4px 8px;
        font-family: "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      }
    </style>
  </head>
  <body>
    <div id="main-bg"></div>
    <main>
      <div class="content-box">
        <div class="name">Egor Koldasov</div>
        <div class="terminal">
          guest@egorkolds_page:~$
        </div>
      </div>
    </main>

    <script src="./windy-forest.js"></script>
    <script>
      window.createWindyForestAscii(document.getElementById("main-bg"), {
        speed: 0.9
      });
    </script>
  </body>
  </html>
